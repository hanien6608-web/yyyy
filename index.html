<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوتوبيا لاند - عالم عشاق الكتب</title>
    <!-- خط كايرو الفخم من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* —-------------------------------------------------
           1. الأساسيات وتنسيق المكتبة الخشبية الفاخرة
           —------------------------------------------------- */
        :root {
            /* درجات الخشب والورق القديم */
            --wood-dark: #2c1b10;
            --wood-mid: #4a3423;
            --paper-light: #e6d5b8; /* لون ورق قديم أهدأ من الأبيض */
            --accent-wood: #d4a373; /* ذهبي برونزي دافئ */
            --wood-gradient: linear-gradient(135deg, #3d2b1f, #2a1b0f);
            
            /* ألوان التصميم */
            --text-main: #d4a373; /* تحويل النص الأساسي للون البرونزي */
            --desc-color: rgba(212, 163, 115, 0.7);
            --card-bg: rgba(20, 15, 10, 0.75); /* زجاجي بني غامق */
            --border-accent: 1px solid rgba(188, 138, 95, 0.3);
            
            --library-bg: url('https://ywbmamklqyrahwqifqdj.supabase.co/storage/v1/object/public/books-images/oo.jpg'); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .book-card, .cart-btn, .action-icon, .category-item, .bottom-bar-item { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Cairo', sans-serif; /* الخط الجديد */
            background-color: #000; /* خلفية احتياطية */
            color: var(--text-main);
            direction: rtl;
            overflow-x: hidden;
        }

        /* حاوية الخلفية الكبيرة (كامل الشاشة وثابتة) */
        .page-wrapper {
            background-image: var(--library-bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        /* طبقة حماية شفافية فوق الخلفية */
        .main-content {
            background: rgba(0, 0, 0, 0.55); /* تغميق الخلفية لزيادة وضوح النصوص */
            backdrop-filter: blur(4px); /* زيادة التغبيش للعمق */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 0; /* إضافة مسافة في الأسفل لضمان عدم اختفاء المحتوى خلف الشريط الثابت */
        }

        /* —-------------------------------------------------
           2. الهيدر والبحث والتصنيفات (Header & Categories)
           —------------------------------------------------- */
        header {
            padding: 10px 5%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fde4ad, #d4a373);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            font-family: 'Cairo', sans-serif;
        }

        /* مربع البحث الفخم بنفس فكرة الموبايل */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            padding: 10px 45px 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(188, 138, 95, 0.4);
            border-radius: 30px;
            color: var(--accent-wood);
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            touch-action: manipulation;
        }

        .search-input:focus {
            border-color: var(--accent-wood);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-wood);
            font-size: 1.1rem;
        }

        /* التصنيفات تحت الهيدر */
        .categories-container {
            margin: 10px auto;
            width: 95%;
            max-width: 750px; /* عرض مريح لعرض التصنيفات بشكل احترافي */
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 8px 20px;
            border: 1px solid rgba(212, 163, 115, 0.2);
            backdrop-filter: blur(15px);
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            scrollbar-width: none; /* إخفاء شريط التمرير للمظهر الجمالي */
        }
        .categories-container::-webkit-scrollbar { display: none; }

        .categories-list {
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            list-style: none;
            white-space: nowrap;
        }

        .category-item {
            padding: 10px 22px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 163, 115, 0.1);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--accent-wood);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            user-select: none;
        }

        .category-item.active, .category-item:hover {
            background: var(--accent-wood);
            color: var(--wood-dark);
            box-shadow: 0 0 15px rgba(212, 163, 115, 0.4);
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* —-------------------------------------------------
           3. أرفف الكتب (The Bookshelf - CSS Grid)
           —------------------------------------------------- */
        .shelf-section {
            padding: 40px 5%;
            flex-grow: 1;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 1024px) {
            .books-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 20px;
            }
        }

        .book-card {
            background: var(--card-bg); 
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(212, 163, 115, 0.2);
            backdrop-filter: blur(15px); /* زيادة التغبيش ليظهر النص بوضوح */
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: visible; /* للسماح للزر بالخروج عن المربع */
            display: flex;
            flex-direction: column;
        }
        
        /* تحسين التفاعل باللمس */
        .book-card:active {
            transform: scale(0.98);
        }

        .book-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* الصورتين بتأثير الفايد */
        .image-box {
            position: relative;
            width: 100%;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        @media (min-width: 1024px) {
            .image-box { height: 240px; }
        }

        .image-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* تعديل: إضافة transition لـ transform أيضاً */
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .main-img { opacity: 1; transform: scale(1); z-index: 1; }
        .hover-img { opacity: 0; transform: scale(1.1); z-index: 1; }

        /* مناطق التحسس (يمين ويسار) */
        .hover-trigger {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            z-index: 10; /* فوق الصور وتحت الأيقونات */
        }
        .trigger-right { right: 0; }
        .trigger-left { left: 0; }

        /* التفاعل: يمين يظهر الصورة 1، يسار يظهر الصورة 2 */
        .trigger-left:hover ~ .hover-img { opacity: 1; transform: scale(1); }
        .trigger-left:hover ~ .main-img { opacity: 0; transform: scale(0.9); }
        
        /* تفاعل الدوائر مع اليمين واليسار */
        .dot:first-child { background: var(--accent-wood); transform: scale(1.2); } /* الافتراضي */
        
        .trigger-left:hover ~ .image-indicators .dot:first-child { 
            background: rgba(212, 163, 115, 0.3); 
            transform: scale(1); 
        }
        .trigger-left:hover ~ .image-indicators .dot:last-child { 
            background: var(--accent-wood); 
            transform: scale(1.2); 
        }

        /* حذف تأثير الهوفر القديم العام */
        /* .book-card:hover .main-img { ... } - تم استبداله بالـ triggers */

        /* دوائر مؤشر الصور */
        .image-indicators {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(212, 163, 115, 0.3);
            border-radius: 50%;
            transition: 0.3s ease;
        }

        .dot.active { background: var(--accent-wood); transform: scale(1.2); }


        /* الأيقونات فوق الصورة بنفس طريقة الموبايل */
        .book-actions {
            position: absolute;
            top: 15px;
            right: 15px; /* نقل القلب لليمين للتوازن */
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .action-icon {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-wood);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-icon:hover {
            background: var(--accent-wood);
            color: var(--wood-dark);
            transform: scale(1.1) rotate(10deg);
        }

        .author-name {
            color: var(--accent-wood);
            font-weight: bold;
            font-size: 0.8rem;
            margin: 5px 0;
        }

        .book-card h3 {
            font-size: 0.95rem;
        }

        .book-desc {
            font-size: 0.7rem;
            color: rgba(253, 250, 245, 0.6);
            height: 45px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .price-cart-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid rgba(212, 163, 115, 0.1);
            padding-top: 15px;
            justify-content: center; /* توسيط السعر بعد خروج الزر */
        }

        .price {
            font-size: 1.2rem;
            color: var(--accent-wood);
            font-weight: bold;
        }

        /* زر السلة العائم الضخم - "اتشال من المربع" */
        .cart-btn {
            position: absolute;
            bottom: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-wood);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 50;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-btn:hover {
            background: var(--accent-wood);
            color: var(--wood-dark);
            transform: scale(1.1) rotate(-10deg);
        }

        /* حالة النجاح عند إضافة كتاب */
        .cart-btn.success {
            background: var(--accent-wood) !important;
            color: var(--wood-dark) !important;
            border: 2px solid var(--paper-light);
            box-shadow: 0 0 25px rgba(212, 163, 115, 0.8);
            transform: scale(1.1) rotate(0deg);
            font-size: 1.4rem; /* تكبير العلامة */
        }

        /* —-------------------------------------------------
           4. الفوتر التفاعلي والاهداء (Footer & Contact)
           —------------------------------------------------- */
        footer {
            padding: 20px 0 0 0;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 0; /* إلغاء المسافة الإضافية */
        }

        .dedication-box {
            background: var(--card-bg); /* نفس لون خلفية كارت الكتاب */
            backdrop-filter: blur(15px); /* إضافة نفس تأثير التغبيش الزجاجي للكروت */
            border-radius: 0; /* لجعل الزوايا حادة */
            padding: 40px 30px; 
            border: none; /* إزالة كافة الحدود لإخفاء الخطوط الملونة تماماً من جميع الجهات */
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 0; /* ملتصق بالأسفل */
            position: relative;
            overflow: hidden;
        }

        .dedication-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(0deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            animation: moveGradient 5s infinite linear;
            pointer-events: none;
        }

        @keyframes moveGradient { 
            0% { top: -100%; left: -100%; } 
            100% { top: 100%; left: 100%; } 
        }

        .dedication-box h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--accent-wood);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
            margin-top: 20px;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-links a:hover {
            color: var(--accent-wood);
            transform: translateY(-3px);
        }

        /* الـ Floating Footer العائم تحت خالص للموبايل بنفس طريقة الموبايل */
        .bottom-bar {
            position: sticky;
            bottom: 20px;
            margin: 0 auto 20px; /* توسيط الشريط مع مسافة سفلية بسيطة */
            width: 90%;
            max-width: 480px;
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 10px 20px;
            border: 1px solid rgba(212, 163, 115, 0.2); /* نفس حدود كارت الكتاب */
            backdrop-filter: blur(15px); /* نفس درجة التغبيش الزجاجي لكروت الكتب */
            z-index: 9999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* نفس ظل كارت الكتاب */
            color: var(--accent-wood);
        }

        .bottom-bar-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .bottom-bar-item:hover {
            opacity: 1;
            transform: translateY(-3px);
        }

        .bottom-bar-item:hover .bar-icon,
        .bottom-bar-item.active .bar-icon {
            background: var(--accent-wood);
            color: var(--wood-dark); /* تغيير اللون للخشبي الداكن عند التفعيل */
            box-shadow: 0 0 15px rgba(212, 163, 115, 0.4);
            transform: scale(1.1);
        }

        .bottom-bar-item.active {
            opacity: 1;
            color: var(--paper-light);
        }

        .bar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; /* أيقونات دائرية مثل المفضلة في الكارت */
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.2rem;
            color: var(--accent-wood);
            transition: 0.3s;
        }

        /* —-------------------------------------------------
           5. سلة المشتريات الجانبية (Cart Drawer)
           —------------------------------------------------- */
        .cart-drawer {
            position: fixed;
            top: 0;
            left: -100%; /* مخفي لليسار */
            width: 100%;
            max-width: 360px;
            height: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            z-index: 10001;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(212, 163, 115, 0.2);
            box-shadow: 10px 0 50px rgba(0,0,0,0.8);
        }

        .cart-drawer.open { left: 0; }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            opacity: 0;
            transition: 0.4s;
        }

        .drawer-overlay.open { display: block; opacity: 1; }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(212, 163, 115, 0.2);
            padding-bottom: 15px;
        }

        .close-drawer { cursor: pointer; font-size: 1.5rem; color: var(--accent-wood); }

        /* تنسيق قائمة الكتب داخل السلة */
        .cart-items-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-left: 5px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(212, 163, 115, 0.1);
        }

        .cart-item img { width: 50px; height: 70px; object-fit: cover; border-radius: 6px; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-info h4 { font-size: 0.85rem; color: var(--paper-light); margin-bottom: 4px; }
        .cart-item-info p { font-size: 0.8rem; color: var(--accent-wood); font-weight: bold; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid rgba(212, 163, 115, 0.2);
        }

        .qty-btn { cursor: pointer; color: var(--accent-wood); font-weight: bold; user-select: none; }
        .qty-val { color: var(--paper-light); font-size: 0.9rem; min-width: 15px; text-align: center; }
        .total-price-area { font-size: 1.1rem; color: var(--accent-wood); text-align: center; margin: 10px 0; font-weight: bold; }

        .order-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            color: var(--accent-wood);
            font-size: 1.1rem;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 163, 115, 0.2);
            border-radius: 12px;
            color: var(--paper-light);
            font-family: 'Cairo';
            outline: none;
        }

        .confirm-order-btn {
            background: var(--accent-wood);
            color: var(--wood-dark);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* رسالة التحميل والخطأ */
        .loading-msg, .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--accent-wood);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* أيقونة العدد فوق السلة */
        .cart-count-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-wood);
            color: var(--wood-dark);
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid var(--wood-dark);
            top: -2px;
            right: -2px;
            z-index: 10000; /* Ensure it's always on top */
            display: none; /* مخفي لو السلة فاضية */
        }
    </style>
</head>
<body> <div class="page-wrapper">
        <div class="main-content">

            <header>
                <div class="top-nav">
                    <div class="logo">يوتوبيا لاند</div>
                </div>
                
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input" placeholder="ابحث عن عنوان أو كاتب...">
                        <span class="search-icon"><i class="bi bi-search"></i></span>
                    </div>
                </div>
            </header>

            <div class="categories-container" id="cats-nav">
                <ul class="categories-list">
                    <li class="category-item active">الكل</li>
                    <li class="category-item">روايات</li>
                    <li class="category-item">فانتزيا</li>
                    <li class="category-item">تنمية ذاتية</li>
                    <li class="category-item">ديني</li>
                    <li class="category-item">رعب</li>
                </ul>
            </div>

            <main class="shelf-section">
                <div class="books-grid" id="books-list">
                    <div class="loading-msg">جاري تحميل أرفف الكتب... <i class="bi bi-book-half"></i></div>
                </div>
            </main>

            <!-- سلة المشتريات الجانبية -->
            <div id="drawer-overlay" class="drawer-overlay" onclick="closeCart()"></div>
            <div id="cart-drawer" class="cart-drawer">
                <div class="cart-header">
                    <h3>تأكيد طلبك <i class="bi bi-bag-check"></i></h3>
                    <span class="close-drawer" onclick="closeCart()"><i class="bi bi-x-lg"></i></span>
                </div>

                <div class="cart-items-list" id="cart-items-container">
                    <!-- هنا تظهر الكتب المضافة -->
                </div>
                <div class="total-price-area" id="cart-total-price">إجمالي الطلب: 0 ج.م</div>

                <div class="order-form">
                    <div class="input-group">
                        <i class="bi bi-person"></i>
                        <input type="text" placeholder="الاسم الثلاثي">
                    </div>
                    <div class="input-group">
                        <i class="bi bi-phone"></i>
                        <input type="tel" placeholder="رقم الموبايل">
                    </div>
                    <div class="input-group">
                        <i class="bi bi-whatsapp"></i>
                        <input type="tel" placeholder="رقم الواتساب">
                    </div>
                    <div class="input-group">
                        <i class="bi bi-geo-alt"></i>
                        <input type="text" placeholder="المحافظة">
                    </div>
                    <div class="input-group">
                        <i class="bi bi-house-door"></i>
                        <textarea placeholder="العنوان بالتفصيل" rows="3"></textarea>
                    </div>
                    <button class="confirm-order-btn">تأكيد وشراء الآن <i class="bi bi-whatsapp"></i></button>
                    <button class="confirm-order-btn" onclick="confirmOrder()">تأكيد وشراء الآن <i class="bi bi-whatsapp"></i></button>
                </div>
            </div>

            <!-- نقل الشريط ليكون داخل الـ main-content وقبل الفوتر مباشرة ليعمل نظام الـ sticky -->
            <div class="bottom-bar" id="bottom-nav-bar">
                <div class="bottom-bar-item active" onclick="showHome()">
                    <span class="bar-icon"><i class="bi bi-house-door"></i></span>
                    <span>الرئيسية</span>
                </div>
                <div class="bottom-bar-item" onclick="openCart()">
                    <span class="bar-icon">
                        <i class="bi bi-cart3"></i>
                        <span id="cart-badge" class="cart-count-badge">0</span>
                    </span>
                    <span>السلة</span>
                </div>
                <div class="bottom-bar-item" onclick="showWishlist(this)">
                    <span class="bar-icon">
                        <i class="bi bi-bookmark-heart"></i>
                        <span id="wish-badge" class="cart-count-badge">0</span>
                    </span>
                    <span>المفضلة</span>
                </div>
                <div class="bottom-bar-item" onclick="showSupport()">
                    <span class="bar-icon"><i class="bi bi-headset"></i></span>
                    <span>الدعم</span>
                </div>
            </div>


            <footer>
                <div class="dedication-box">
                    <h3>إهداء خاص <i class="bi bi-feather"></i></h3>
                    <p>لكل من يجد ضالته بين الأسطر، لكل من يسافر دون أن يتحرك، ولكل عشاق الكتب.. هذا المكان لكم.</p>
                    
                    <ul class="social-links">
                        <li><a href="https://facebook.com/u_library" target="_blank"><i class="bi bi-facebook"></i> فيس بوك</a></li>
                        <li><a href="https://wa.me/u_library" target="_blank"><i class="bi bi-whatsapp"></i> واتس آب</a></li>
                    </ul>
                </div>
            </footer>

        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ywbmamklqyrahwqifqdj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3Ym1hbWtscXlyYWh3cWlmcWRqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTQ4MDM5OSwiZXhwIjoyMDkxMDU2Mzk5fQ.bHOZHb1zDAe-LUX1Vtt5G5UabhfHxUlQvrplxvZ0Dgo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // مصفوفة السلة (تحميل من الذاكرة المحلية)
        let cart = JSON.parse(localStorage.getItem('utopia_cart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('utopia_wishlist')) || [];
        let isWishlistView = false; // متغير لمتابعة هل نحن في صفحة المفضلة أم لا
        let wishlistSeen = false; // متغير للتحكم في إخفاء رقم المفضلة بعد رؤيتها
        let allBooks = []; // لتخزين الكتب محلياً للفلترة السريعة

        // 1. تشغيل الداتا فور فتح الصفحة
        document.querySelector('.search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allBooks.filter(b => b.title.toLowerCase().includes(term) || b.author.toLowerCase().includes(term));
            renderBooks(filtered);
        });
        document.addEventListener('DOMContentLoaded', getMyLibraryData);
        // إضافة console.log للتأكد من تحديث عداد السلة والمفضلة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
            updateWishUI();
        });
        document.addEventListener('DOMContentLoaded', updateCartUI);
        document.addEventListener('DOMContentLoaded', updateWishUI);

        // 2. دالة جلب البيانات من سوبابيز وعرضها
        async function getMyLibraryData() {
            const { data, error } = await _supabase
                .from('books') 
                .select('*');

            if (error) {
                console.error("Error connecting:", error.message);
                document.getElementById('books-list').innerHTML = `<div class="error-msg">فشل الاتصال.</div>`;
                return;
            }

            allBooks = data;
            renderBooks(allBooks);
        }

        function renderBooks(booksToRender) {
            const container = document.getElementById('books-list');
            container.innerHTML = booksToRender.length === 0 
                ? `<div class="error-msg">الأرفف خالية! ضيفي كتب في سوبابيز أولاً.</div>`
                : booksToRender.map((book, index) => {
                    const hasSecondImg = book.image_url2 && book.image_url2 !== book.image_url;
                    const isInCart = cart.some(item => item.id === book.id);
                    const isInWish = wishlist.includes(String(book.id));

                    return `
                    <div class="book-card" style="animation: fadeInUp ${0.3 + (index * 0.1)}s ease-out;">
                        
                        <div class="image-box">
                            ${hasSecondImg ? `
                                <div class="hover-trigger trigger-right"></div>
                                <div class="hover-trigger trigger-left"></div>
                            ` : ''}
                            <img src="${book.image_url}" class="main-img">
                            ${hasSecondImg ? `<img src="${book.image_url2}" class="hover-img">` : ''}
                            <div class="image-indicators">
                                <div class="dot active"></div>
                                ${hasSecondImg ? `<div class="dot"></div>` : ''}
                            </div>
                        </div>

                        <div class="book-actions">
                            <span class="action-icon" onclick="toggleWish('${book.id}')">
                                <i class="bi ${isInWish ? 'bi-bookmark-heart-fill' : 'bi-bookmark-heart'}"></i>
                            </span>
                        </div>

                        <h3>${book.title}</h3>
                        <p class="author-name">تأليف: ${book.author}</p>
                        <p class="book-desc">${book.description || ''}</p>
                        
                        <button class="cart-btn ${isInCart ? 'success' : ''}" onclick="addToCart(this, {id: '${book.id}', title: '${book.title}', price: ${book.price}, img: '${book.image_url}'})">
                            <i class="bi ${isInCart ? 'bi-check-circle-fill' : 'bi-cart-plus'}"></i>
                        </button>

                        <div class="price-cart-container">
                            <div class="price">${book.price} ج.م</div>
                        </div>
                    </div>
                `}).join('');
        }

        // وظيفة إضافة الكتاب وتغيير الأيقونة
        function addToCart(btn, book) {
            // التأكد إذا كان الكتاب موجود مسبقاً
            const existingItem = cart.find(item => item.id === book.id);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ ...book, qty: 1 });
            }

            // حفظ السلة
            localStorage.setItem('utopia_cart', JSON.stringify(cart));
            updateCartUI();

            console.log(`تم إضافة "${book.title}" إلى السلة!`); // رسالة تأكيد للإضافة
            // تغيير الأيقونة والاستايل
            btn.classList.add('success');
            btn.innerHTML = '<i class="bi bi-check-circle-fill"></i>';
            
            // فتح السلة تلقائياً بعد ثانية
            setTimeout(() => { openCart(); }, 600);
        }

        // وظيفة العودة للرئيسية - إصلاح عدم الاستجابة
        function showHome() {
            isWishlistView = false; // عدنا للرئيسية
            // 1. تمييز زر الرئيسية كنشط
            document.querySelectorAll('.bottom-bar-item').forEach(i => i.classList.remove('active'));
            document.querySelector('.bottom-bar-item:first-child').classList.add('active');

            // 2. إظهار التصنيفات
            document.getElementById('cats-nav').style.display = 'block'; // التأكد من إظهار شريط التصنيفات
            renderBooks(allBooks);
            updateWishUI();
        }
        
        // وظائف المفضلة
        function toggleWish(bookId) {
            const sId = String(bookId);
            const index = wishlist.indexOf(sId);
            if (index === -1) {
                wishlist.push(sId);
                wishlistSeen = false; // إذا أضافت كتاب جديد، يظهر الرقم مرة أخرى كتنبيه
            } else {
                wishlist.splice(index, 1);
            }
            localStorage.setItem('utopia_wishlist', JSON.stringify(wishlist));
            console.log("Wishlist updated, calling updateWishUI(). Current length:", wishlist.length); // رسالة مراقبة
            
            if (isWishlistView) {
                // إذا كنا في صفحة المفضلة، نحذف الكارت فوراً من الشاشة لاستجابة سريعة
                showWishlist(document.querySelector('.bottom-bar-item[onclick*="showWishlist"]'));
            } else {
                // إذا كنا في الرئيسية، نحدث شكل القلب فقط
                const cardActionIcon = document.querySelector(`.book-card .action-icon[onclick*="toggleWish('${sId}')"]`);
                if (cardActionIcon) {
                    const icon = cardActionIcon.querySelector('i');
                    if (icon) icon.className = `bi ${wishlist.includes(sId) ? 'bi-bookmark-heart-fill' : 'bi-bookmark-heart'}`;
                }
            }
            
            updateWishUI();
        }

        function updateWishUI() {
            const badge = document.getElementById('wish-badge');
            const count = wishlist.length;

            // العداد يختفي لو القيمة 0، أو لو تم الدخول لصفحة المفضلة (wishlistSeen)
            if (count === 0 || wishlistSeen) {
                badge.style.display = 'none';
            } else {
                badge.innerText = count;
                badge.style.display = 'flex';
            }
        }

        function showWishlist(el) {
            isWishlistView = true; // نحن الآن في صفحة المفضلة
            wishlistSeen = true;   // تم رؤية المفضلة، سيختفي الرقم الآن
            
            // تمييز الزر كنشط
            document.querySelectorAll('.bottom-bar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // فلترة الكتب
            const filtered = allBooks.filter(b => wishlist.includes(String(b.id)));
            
            // تغيير العنوان أو التفاعل البصري
            // نتحقق أولاً إذا كانت allBooks قد تم تحميلها
            if (allBooks.length === 0) {
                document.getElementById('books-list').innerHTML = `<div class="error-msg">جاري تحميل الكتب... الرجاء المحاولة لاحقاً.</div>`;
                // يمكن إضافة منطق لإعادة المحاولة بعد التحميل
            } else if (filtered.length === 0) {
                document.getElementById('books-list').innerHTML = `<div class="error-msg">قائمة المفضلة فارغة حالياً ❤️</div>`;
            } else {
                renderBooks(filtered); // عرض الكتب المفضلة
            }
            // إخفاء قسم التصنيفات عند عرض المفضلة لإعطاء مساحة
            document.getElementById('cats-nav').style.display = 'none';
            updateWishUI(); // لإخفاء العداد فوراً عند الدخول
        }

        // تحديث واجهة السلة (العدد، العناصر، الإجمالي)
        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');

            console.log("updateCartUI called. Current cart items count:", cart.length); // رسالة مراقبة
            // 1. تحديث البادج
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            
            if (totalItems > 0) {
                badge.innerText = totalItems;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none'; // يختفي لو 0
            }

            // 2. عرض العناصر في السلة
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.5;">السلة خالية حالياً</p>';
                totalEl.innerText = 'إجمالي الطلب: 0 ج.م';
                return;
            }

            let totalPrice = 0;
            container.innerHTML = cart.map((item, index) => {
                totalPrice += (item.price * item.qty);
                return `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.title}">
                    <div class="cart-item-info">
                        <h4>${item.title}</h4>
                        <p>${item.price} ج.م</p>
                    </div>
                    <div class="qty-controls">
                        <span class="qty-btn" onclick="changeQty(${index}, -1)"><i class="bi bi-dash"></i></span>
                        <span class="qty-val">${item.qty}</span>
                        <span class="qty-btn" onclick="changeQty(${index}, 1)"><i class="bi bi-plus"></i></span>
                    </div>
                </div>
                `;
            }).join('');

            totalEl.innerText = `إجمالي الطلب: ${totalPrice} ج.م`;
        }

        // تغيير الكمية
        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('utopia_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function openCart() {
            document.getElementById('cart-drawer').classList.add('open');
            document.getElementById('drawer-overlay').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cart-drawer').classList.remove('open');
            document.getElementById('drawer-overlay').classList.remove('open');
        }

        // وظيفة إرسال الطلب عبر الواتساب
        function confirmOrder() {
            if (cart.length === 0) {
                alert("سلة المشتريات فارغة! الرجاء إضافة كتب قبل تأكيد الطلب.");
                return;
            }

            const name = document.querySelector('.order-form input[placeholder="الاسم الثلاثي"]').value;
            const phone = document.querySelector('.order-form input[placeholder="رقم الموبايل"]').value;
            const whatsapp = document.querySelector('.order-form input[placeholder="رقم الواتساب"]').value;
            const governorate = document.querySelector('.order-form input[placeholder="المحافظة"]').value;
            const address = document.querySelector('.order-form textarea[placeholder="العنوان بالتفصيل"]').value;

            if (!name || !phone || !whatsapp || !governorate || !address) {
                alert("الرجاء تعبئة جميع حقول معلومات الشحن.");
                return;
            }

            let message = `*طلب جديد من يوتوبيا لاند:*\n\n`;
            message += `*الاسم:* ${name}\n`;
            message += `*رقم الموبايل:* ${phone}\n`;
            message += `*رقم الواتساب:* ${whatsapp}\n`;
            message += `*المحافظة:* ${governorate}\n`;
            message += `*العنوان:* ${address}\n\n`;
            message += `*تفاصيل الطلب:*\n`;

            let totalOrderPrice = 0;
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.title} (الكمية: ${item.qty}) - ${item.price * item.qty} ج.م\n`;
                totalOrderPrice += (item.price * item.qty);
            });
            message += `\n*الإجمالي الكلي:* ${totalOrderPrice} ج.م\n\n`;
            message += `شكراً لتسوقكم من يوتوبيا لاند! ✨`;

            // رقم الواتساب الذي سيتم إرسال الطلب إليه (يمكنك تغييره)
            const recipientWhatsappNumber = '201551455490'; // مثال: رقم واتساب المتجر
            const whatsappUrl = `https://wa.me/${recipientWhatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');

            // مسح السلة بعد إرسال الطلب
            cart = [];
            localStorage.setItem('utopia_cart', JSON.stringify(cart));
            updateCartUI();
            closeCart();
            alert("تم إرسال طلبك بنجاح عبر الواتساب! سنتواصل معك قريباً لتأكيد الطلب.");
        }

        // 4. خدمات العملاء (تجربة تفاعلية)
        function showSupport() {
            alert('💬 جاري فتح شات خدمة العملاء.. لحظة واحدة!');
        }

        // 5. نظام التبديل بين العناصر النشطة (Active State)
        function initTabs(selector) {
            const items = document.querySelectorAll(selector);
            items.forEach(item => {
                item.addEventListener('click', function() {
                    if (this.onclick) return; // إذا كان هناك وظيفة مبرمجة يدوياً لا تتدخل
                    items.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    
                    // إضافة منطق الفلترة بناءً على النص داخل التصنيف
                    const category = this.innerText.trim();
                    if (category === 'الكل') {
                        renderBooks(allBooks);
                    } else {
                        renderBooks(allBooks.filter(b => b.category === category));
                    }
                });
            });
        }
        initTabs('.category-item');
    </script>
</body>
</html>
