<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوتوبيا لاند - عالم عشاق الكتب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --wood-dark: #2c1b10;
            --wood-mid: #4a3423;
            --paper-light: #e6d5b8;
            --accent-wood: #d4a373;
            --card-bg: rgba(20, 15, 10, 0.75);
            --library-bg: url('https://ywbmamklqyrahwqifqdj.supabase.co/storage/v1/object/public/books-images/oo.jpg'); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            color: var(--text-main);
            direction: rtl;
        }

        .page-wrapper {
            background-image: var(--library-bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .main-content {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { padding: 20px 5%; display: flex; flex-direction: column; gap: 15px; }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--paper-light); }

        .search-container { width: 100%; display: flex; justify-content: center; }
        .search-input-wrapper { position: relative; width: 100%; max-width: 600px; }
        .search-input {
            width: 100%; padding: 15px 50px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(188, 138, 95, 0.4); border-radius: 30px; color: var(--accent-wood);
            outline: none; backdrop-filter: blur(10px);
        }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--accent-wood); }

        .categories-container {
            margin: 20px auto; width: 95%; max-width: 750px; background: var(--card-bg); 
            border-radius: 20px; padding: 15px 25px; border: 1px solid rgba(212, 163, 115, 0.2);
            backdrop-filter: blur(15px); overflow-x: auto;
        }
        .categories-list { display: flex; gap: 15px; list-style: none; }
        .category-item {
            padding: 10px 22px; background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            font-size: 0.85rem; color: var(--accent-wood); cursor: pointer; font-weight: bold;
        }
        .category-item.active { background: var(--accent-wood); color: var(--wood-dark); }

        .shelf-section { padding: 40px 5%; flex-grow: 1; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .book-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center;
            border: 1px solid rgba(212, 163, 115, 0.2); backdrop-filter: blur(15px);
            position: relative; display: flex; flex-direction: column;
        }

        .image-box { position: relative; width: 100%; height: 300px; border-radius: 10px; overflow: hidden; }
        .image-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

        .book-actions { position: absolute; top: 15px; right: 15px; z-index: 10; }
        .action-icon {
            width: 45px; height: 45px; background: rgba(0, 0, 0, 0.6); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: var(--accent-wood);
        }

        .price { font-size: 1.5rem; color: var(--accent-wood); font-weight: bold; margin-top: 15px; }
        .cart-btn {
            position: absolute; bottom: 15px; left: 15px; width: 45px; height: 45px;
            background: rgba(0, 0, 0, 0.6); border-radius: 50%; color: var(--accent-wood);
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer;
        }

        footer { padding: 40px 5%; margin-top: auto; }
        .dedication-box {
            background: var(--card-bg); backdrop-filter: blur(15px); padding: 30px; 
            border-radius: 20px; text-align: center; color: var(--accent-wood);
        }

        /* --------------------------------------------------
           التعديل المطلوب: تثبيت المربع في "نصف الشاشة" رأسياً
           -------------------------------------------------- */
        .bottom-bar {
            position: fixed; 
            top: 100%; /* تجعل المربع يبدأ من منتصف الارتفاع */
            left: 50%;
            transform: translate(-50%, -50%); /* يضمن توسيطه أفقياً ورأسياً بدقة */
            width: 90%;
            max-width: 450px;
            background: var(--card-bg); 
            border-radius: 25px; 
            padding: 15px 25px;
            border: 1px solid rgba(212, 163, 115, 0.4);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .bottom-bar-item {
            text-align: center; display: flex; flex-direction: column; align-items: center;
            gap: 4px; cursor: pointer; font-size: 0.75rem; color: var(--accent-wood);
        }

        .bar-icon {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(0, 0, 0, 0.4); font-size: 1.3rem;
        }
        
        .bottom-bar-item.active .bar-icon { background: var(--accent-wood); color: var(--wood-dark); }

    </style>
</head>
<body> 
    <div class="page-wrapper">
        <div class="main-content">
            <header>
                <div class="logo">يوتوبيا لاند</div>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input" placeholder="ابحث...">
                        <span class="search-icon"><i class="bi bi-search"></i></span>
                    </div>
                </div>
            </header>

            <div class="categories-container">
                <ul class="categories-list">
                    <li class="category-item active">الكل</li>
                    <li class="category-item">روايات</li>
                    <li class="category-item">فانتزيا</li>
                </ul>
            </div>

            <main class="shelf-section">
                <div class="books-grid" id="books-list">
                    </div>
            </main>

            <footer>
                <div class="dedication-box">
                    <h3>إهداء خاص</h3>
                    <p>لكل عشاق الكتب.. هذا المكان لكم.</p>
                </div>
            </footer>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-bar-item active">
            <span class="bar-icon"><i class="bi bi-house-door"></i></span>
            <span>الرئيسية</span>
        </div>
        <div class="bottom-bar-item">
            <span class="bar-icon"><i class="bi bi-cart3"></i></span>
            <span>السلة</span>
        </div>
        <div class="bottom-bar-item">
            <span class="bar-icon"><i class="bi bi-bookmark-heart"></i></span>
            <span>المفضلة</span>
        </div>
        <div class="bottom-bar-item">
            <span class="bar-icon"><i class="bi bi-headset"></i></span>
            <span>الدعم</span>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://ywbmamklqyrahwqifqdj.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3Ym1hbWtscXlyYWh3cWlmcWRqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTQ4MDM5OSwiZXhwIjoyMDkxMDU2Mzk5fQ.bHOZHb1zDAe-LUX1Vtt5G5UabhfHxUlQvrplxvZ0Dgo'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function getMyLibraryData() {
            const container = document.getElementById('books-list');
            const { data } = await _supabase.from('books').select('*');
            if (data) {
                container.innerHTML = data.map(book => `
                    <div class="book-card">
                        <div class="image-box"><img src="${book.image_url}"></div>
                        <h3>${book.title}</h3>
                        <p>${book.author}</p>
                        <div class="price">${book.price} ج.م</div>
                        <button class="cart-btn"><i class="bi bi-cart-plus"></i></button>
                    </div>
                `).join('');
            }
        }
        getMyLibraryData();
    </script>
</body>
</html>
